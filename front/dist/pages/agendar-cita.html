<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Cita</title>

     <!-- 1. Aquí va el CSS de Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="../css/style.css"> <!-- css escritorio -->
    <link rel="stylesheet" href="../css/mobile.css"> <!-- css mobile -->

</head>
<body>

    <header>
        <!-- Zona de menu y portada(portada opcional) -->
        <nav class="navbar navbar-expand-md navbar-dark bg-primary"> <!-- el menu en el nav -->
            <div class="container">
                <a class="navbar-brand" href="../../index.html">Clínica Dental</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="../../index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="mis-agendas.html">Mis Agendas</a></li>
                        <li class="nav-item"><a class="nav-link active" href="agendar-cita.html">Agendar Cita</a></li>
                        <li class="nav-item"><a class="nav-link" href="panel-horarios.html">Panel de Horarios</a></li>
                        <li class="nav-item"><a class="nav-link" href="alta-profesionales.html">Alta de Profesionales</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>


    <main>

        <!-- Toda la estructura de la web con secciones -->

        <div class="container mt-5 mb-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <h1 class="mb-4">Agendar Cita</h1>

                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" placeholder="Tu nombre">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tratamiento</label>
                        <select class="form-control">
                            <option>Limpieza dental</option>
                            <option>Control de ortodoncia</option>
                            <option>Extracción</option>
                            <option>Consulta general</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Odontólogo</label>
                        <select class="form-control">
                            <option>Dra. Pérez</option>
                            <option>Dr. Gómez</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fecha</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Hora</label>
                        <input type="time" class="form-control">
                    </div>

                    <button type="button" class="btn btn-primary mt-2" data-bs-toggle="modal" data-bs-target="#exito">Confirmar Cita</button>
                </div>
            </div>
        </div>

        <div class="modal fade" id="exito" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Cita confirmada</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>Tu cita fue agendada con éxito. Te esperamos en la clínica.</p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>

    </main>



    <footer class="bg-light text-center py-4 mt-5">

        <!-- zona de pie de pagina -->
        <div class="container">
            <p class="mb-0 text-muted">Clínica Dental - Todos los derechos reservados</p>
        </div>

    </footer>


    <!-- 2. Aquí va el JavaScript de Bootstrap (Justo antes de cerrar el body) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/script.js"></script> <!-- javascript nuestro -->
</body>
</html>
